<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chart v5</title>
<script src="https://unpkg.com/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0a0e1a; color: #dce6ff;
               font-family: Consolas, monospace; font-size: 13px; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  #status {
    background: #0f1528; border-bottom: 1px solid #1a2744;
    padding: 6px 12px; white-space: nowrap;
  }
  #chart { flex: 1; min-height: 0; }
</style>
</head>
<body>
<div id="app">
  <div id="status">price: —  |  ws: connecting…</div>
  <div id="chart"></div>
</div>

<script>
const statusEl = document.getElementById('status');

const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  layout: { background: { type: 'solid', color: '#0a0e1a' }, textColor: '#dce6ff' },
  grid: { vertLines: { color: '#1a2744' }, horzLines: { color: '#1a2744' } },
  timeScale: { timeVisible: true, secondsVisible: false, borderColor: '#1a2744' },
  rightPriceScale: { borderColor: '#1a2744' },
  crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
});

const candleSeries = chart.addCandlestickSeries({
  upColor: '#00e676', downColor: '#ff3b6b',
  borderUpColor: '#00e676', borderDownColor: '#ff3b6b',
  wickUpColor: '#00e676', wickDownColor: '#ff3b6b',
});

window.addEventListener('resize', () => {
  chart.applyOptions({
    width: document.getElementById('chart').clientWidth,
    height: document.getElementById('chart').clientHeight,
  });
});

let currentBar = null;

function floorMinute(ts) {
  return Math.floor(ts / 60) * 60;
}

function onTick(price, ts) {
  if (!price || price <= 0) return;
  const minute = floorMinute(ts);
  if (!currentBar || currentBar.time !== minute) {
    currentBar = { time: minute, open: price, high: price, low: price, close: price };
  } else {
    if (price > currentBar.high) currentBar.high = price;
    if (price < currentBar.low) currentBar.low = price;
    currentBar.close = price;
  }
  try { candleSeries.update(currentBar); } catch (e) {}
  chart.timeScale().scrollToRealTime();
}

function setStatus(price, wsState) {
  const p = price != null ? price.toFixed(2) : '—';
  statusEl.textContent = `price: ${p}  |  ws: ${wsState}`;
}

const WS_URL = 'ws://localhost:8765';
let ws = null;
let reconnectTimer = null;
let lastPrice = null;

function connect() {
  setStatus(lastPrice, 'connecting…');
  try { ws = new WebSocket(WS_URL); } catch (e) {
    setStatus(lastPrice, 'error');
    scheduleReconnect(); return;
  }

  ws.onopen = () => setStatus(lastPrice, 'connected');

  ws.onmessage = (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch (e) { return; }

    if (msg.type === 'history') {
      candleSeries.setData(msg.bars);
      chart.timeScale().fitContent();
      if (msg.bars.length > 0) {
        const last = msg.bars[msg.bars.length - 1];
        lastPrice = last.close;
        currentBar = { ...last };
        setStatus(lastPrice, 'connected');
      }
      return;
    }

    const price = Number(msg.price) || 0;
    const ts = Number(msg.ts) || Math.floor(Date.now() / 1000);
    if (price > 0) {
      lastPrice = price;
      setStatus(price, 'connected');
    }
    onTick(price, ts);
  };

  ws.onclose = () => { setStatus(lastPrice, 'disconnected'); scheduleReconnect(); };
  ws.onerror = () => {};
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, 3000);
}

connect();
</script>
</body>
</html>
